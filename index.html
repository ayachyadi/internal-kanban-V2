<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprout Task Tracker</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23282828'/><path d='M30,80 C30,50 50,30 80,30 C60,50 45,60 45,80 Z' fill='%23CCFA59'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h2>Sprout <span>Task Tracker</span></h2>
        <div class="nav-links">
            <a href="index.html" class="active">Papan Kanban</a>
            <a href="log.html">Log Aktivitas</a>
            <a href="report.html">Laporan</a>
            <a href="tentang.html">Tentang</a>
            <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.2); margin: 0 16px 0 32px;"></div>
            <button onclick="prosesLogout()" style="margin-left: 0;">Keluar</button>
            <a href="profile.html" class="nav-profile-link" style="position: relative;">
                <img id="navProfileIcon" src="" alt="Profil">
                <span id="notifBadge" class="notif-badge" style="display: none;"></span>
            </a>
        </div>
    </nav>

    <main class="board-container">
        <div class="board-controls" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <span class="control-label">Urutkan berdasarkan:</span>
                <select id="sortSelect" class="sprout-select" onchange="renderPapanKanban()">
                    <option value="default">Terbaru Ditambahkan</option>
                    <option value="dueDate">Tenggat Waktu</option>
                    <option value="category">Kategori</option>
                </select>
            </div>
            <div style="display: flex; gap: 12px;">
                <button onclick="bukaModalArsip()" style="background-color: transparent; color: #282828; border: 1px solid rgba(40,40,40,0.15); padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;">Lihat Arsip</button>
                <button onclick="window.location.href='report.html'" style="background-color: #CCFA59; color: #282828; border: none; padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;">Laporan Kinerja →</button>
            </div>
        </div>

        <div class="board">
            <div class="column" ondrop="drop(event, 'todo')" ondragover="allowDrop(event)">
                <div class="column-header">
                    <h3>To-Do</h3>
                    <button class="icon-add-btn" onclick="bukaModalTambah('todo')" title="Tambah Tugas">+</button>
                </div>
                <div class="task-list" id="list-todo"></div>
            </div>
            <div class="column" ondrop="drop(event, 'doing')" ondragover="allowDrop(event)">
                <div class="column-header">
                    <h3>Doing</h3>
                    <button class="icon-add-btn" onclick="bukaModalTambah('doing')" title="Tambah Tugas">+</button>
                </div>
                <div class="task-list" id="list-doing"></div>
            </div>
            <div class="column" ondrop="drop(event, 'review')" ondragover="allowDrop(event)">
                <div class="column-header"><h3>Review</h3></div>
                <div class="task-list" id="list-review"></div>
            </div>
            <div class="column" ondrop="drop(event, 'done')" ondragover="allowDrop(event)">
                <div class="column-header"><h3>Done</h3></div>
                <div class="task-list" id="list-done"></div>
            </div>
        </div>
    </main>

    <div id="cardModal" class="modal">
        <div class="modal-content modal-large">
            <span class="close-btn" onclick="tutupModal()">&times;</span>
            <h2 id="modalHeader">Detail Tugas</h2>
            <form id="taskForm" onsubmit="simpanTugas(event)">
                <div class="input-group">
                    <label>Judul Tugas</label>
                    <input type="text" id="inputTitle" required>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label>Kategori</label>
                        <select id="inputCategory" required class="sprout-select"></select>
                    </div>
                    <div class="input-group">
                        <label>Tenggat Waktu</label>
                        <input type="date" id="inputDue" required>
                    </div>
                </div>
                <div class="input-group" style="position: relative;">
                    <label>PIC</label>
                    <div class="multi-select-container" onclick="document.getElementById('inputPerson').focus()">
                        <div id="selectedPics"></div>
                        <input type="text" id="inputPerson" autocomplete="off" placeholder="Ketik nama...">
                    </div>
                    <div id="picSuggestions" class="suggestions-box" style="display: none;"></div>
                </div>
                <div class="input-group">
                    <label>Deskripsi Tugas</label>
                    <div class="rich-text-toolbar">
                        <button type="button" onclick="formatText('bold')">B</button>
                        <button type="button" onclick="formatText('italic')">I</button>
                        <button type="button" onclick="formatText('underline')">U</button>
                        <div class="divider"></div>
                        <button type="button" onclick="formatText('insertUnorderedList')">• List</button>
                        <button type="button" onclick="tambahLink()">🔗 Link</button>
                    </div>
                    <div id="inputDesc" contenteditable="true" class="rich-text-editor" onkeyup="deteksiMention(event)"></div>
                </div>
                <label class="checkbox-container">
                    <input type="checkbox" id="inputDoneCheck">
                    <span class="checkmark"></span>
                    Tandai tugas ini telah selesai dikerjakan (Review)
                </label>
                <div class="form-actions">
                    <button type="button" id="btnDelete" class="delete-btn" onclick="hapusTugas()">Hapus</button>
                    <button type="submit" class="save-btn">Simpan Perubahan</button>
                </div>
            </form>
            <div id="commentSection">
                <h3>Komentar Tim</h3>
                <div id="commentsList"></div>
                <div class="add-comment-box">
                    <input type="text" id="inputComment" placeholder="Ketik @ untuk tag..." onkeyup="deteksiMention(event)">
                    <button type="button" onclick="simpanKomentar()">Kirim</button>
                </div>
            </div>
        </div>
    </div>

    <div id="archiveModal" class="modal">
        <div class="modal-content modal-large">
            <span class="close-btn" onclick="document.getElementById('archiveModal').style.display='none'">&times;</span>
            <h2>Pusat Arsip</h2>
            <p style="font-size: 13px; color: gray; margin-bottom: 24px;">Data historis yang tidak aktif di papan utama.</p>
            <div id="archiveList"></div>
        </div>
    </div>

    <div id="mentionBox" class="suggestions-box" style="display: none;"></div>
    <script type="module" src="script.js"></script>
</body>
</html>
