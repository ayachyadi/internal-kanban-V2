<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Aktivitas - Task Tracker</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23282828'/><path d='M30,80 C30,50 50,30 80,30 C60,50 45,60 45,80 Z' fill='%23CCFA59'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h2>Sprout <span>Task Tracker</span></h2>
        
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <div class="nav-links" id="navLinks">
            <a href="index.html">Papan Kanban</a>
            <a href="log.html" class="active">Log Aktivitas</a>
            <a href="report.html">Laporan</a>
            <a href="tentang.html">Tentang</a>
            
            <div class="nav-divider"></div>
            
            <button onclick="prosesLogout()" class="logout-btn">Keluar</button>
            
            <a href="profile.html" class="nav-profile-link" style="position: relative;">
                <img id="navProfileIcon" src="" alt="Profil">
                <span id="notifBadge" class="notif-badge" style="display: none;"></span>
            </a>
        </div>
    </nav>

    <main class="content-page">
        <h1>Riwayat Aktivitas Sistem</h1>
        <button onclick="bersihkanLog()" style="margin-bottom: 15px; padding: 8px; background: #dfe1e6; border: none; border-radius: 4px; cursor: pointer;">Bersihkan Log</button>
        
        <table class="log-table">
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Pengguna</th>
                    <th>Aksi</th>
                    <th>Tugas</th>
                </tr>
            </thead>
            <tbody id="logTableBody">
                </tbody>
        </table>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
